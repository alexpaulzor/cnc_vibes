# Full 300x300mm NORA puzzle — cut only (no raster).
# The canonical deliverable. 44 pieces (40 cells + 4 letters).
#
# Run:
#   python cnc.py jigsaw lessons/laser/03_jigsaw/examples/nora_300.yaml
#   python cnc.py preflight lessons/laser/03_jigsaw/examples/nora_300.yaml
#   python cnc.py validate lessons/laser/03_jigsaw/build/cut_full_nora_seed7.gcode

head: laser
material: mdf_3mm
gcode: lessons/laser/03_jigsaw/build/cut_full_nora_seed7.gcode

jigsaw:
  mode: cut
  size: full
  word: NORA
  seed: 7
