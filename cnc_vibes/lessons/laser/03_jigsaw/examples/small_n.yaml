# Small (80x80mm) calibration puzzle: single letter N.
# Use this to dial in feed/power before committing to the full panel.
#
# Run:
#   python cnc.py jigsaw lessons/laser/03_jigsaw/examples/small_n.yaml
#   python cnc.py preflight lessons/laser/03_jigsaw/examples/small_n.yaml
#   python cnc.py validate lessons/laser/03_jigsaw/build/cut_small_n_seed7.gcode

head: laser
material: mdf_3mm
gcode: lessons/laser/03_jigsaw/build/cut_small_n_seed7.gcode

jigsaw:
  mode: cut
  size: small
  word: N
  seed: 7
