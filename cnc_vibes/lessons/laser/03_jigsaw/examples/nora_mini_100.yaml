# Mini NORA puzzle — 100x100mm, 4x4 grid, cut only (no raster).
# Sized for a test cut on a 3mm corrugated cardboard scrap.
#
# Run:
#   python cnc.py jigsaw lessons/laser/03_jigsaw/examples/nora_mini_100.yaml
#   python cnc.py validate lessons/laser/03_jigsaw/build/cut_mini_nora_seed7.gcode
#
# BEFORE the real cut: dial in the cold-start dwell on a scrap with
#   python cnc.py cal-laser --material cardboard_corrugated_3mm \
#       --sweep warmup --values 0,100,200,300,400 --power 40 --feed 1400
# then set warmup_ms below to the shortest dwell that cut cleanly.
#
# FIRE RISK: corrugated cardboard. Air assist non-negotiable; never
# leave the machine unattended.

head: laser
material: cardboard_corrugated_3mm
gcode: lessons/laser/03_jigsaw/build/cut_mini_nora_seed7.gcode

jigsaw:
  mode: cut
  size: mini
  word: NORA
  seed: 7
  laser_mode: static     # M3 constant power: non-zero S, immune to M4 cold-start fade
  warmup_ms_first: 750   # G4 dwell on the FIRST cut (diode coldest)
  warmup_ms: 250         # G4 dwell on later cuts (keep the warm diode from fading)
  feed: 800              # cut feedrate mm/min
  min_segment_mm: 0.05   # decimate any G1 chord shorter than this
  power_percent: 100     # weak diode — cut at full power (S1000)
