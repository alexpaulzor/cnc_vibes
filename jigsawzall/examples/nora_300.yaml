# Full 300x300mm NORA puzzle — cut only (no raster).
# The canonical deliverable. 44 pieces (40 cells + 4 letters).
#
# Run:
#   python cnc.py jigsaw examples/nora_300.yaml
#   python cnc.py preflight examples/nora_300.yaml
#   python cnc.py validate build/cut_full_nora_seed7.gcode

head: laser
material: mdf_3mm
gcode: build/cut_full_nora_seed7.gcode

jigsaw:
  mode: cut
  size: full
  word: NORA
  seed: 7
