# Full 300x300mm NORA puzzle with a halftone-rastered photo overlay.
# Emits THREE files (raster / cut / combined) when run; the `gcode:` key
# below points at the combined file — the canonical artifact for the
# full job. The raster + cut files are siblings in the same build/ dir.
#
# Update `jigsaw.image` to a real path before running. The placeholder
# below makes the schema valid for tests but won't survive an actual
# `cnc.py jigsaw` invocation until the path resolves to an image.
#
# Run:
#   python cnc.py jigsaw examples/nora_with_photo.yaml
#   python cnc.py preflight examples/nora_with_photo.yaml

head: laser
material: mdf_3mm
gcode: build/full_nora_halftone_full.gcode

jigsaw:
  mode: raster
  size: full
  word: NORA
  seed: 7
  image: ~/Pictures/nora_portrait.jpg
  raster_mode: halftone
  line_spacing_mm: 0.20
  engrave_power_percent: 30
  engrave_feed: 3000
