# Small (80x80mm) calibration puzzle: single letter N.
# Use this to dial in feed/power before committing to the full panel.
#
# Run:
#   python cnc.py jigsaw examples/small_n.yaml
#   python cnc.py preflight examples/small_n.yaml
#   python cnc.py validate build/cut_small_n_seed7.gcode

head: laser
material: mdf_3mm
gcode: build/cut_small_n_seed7.gcode

jigsaw:
  mode: cut
  size: small
  word: N
  seed: 7
