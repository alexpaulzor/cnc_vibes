# Mini NORA puzzle — 100x100mm, 4x4 grid, cut only (no raster).
# Sized for a test cut on a 3mm corrugated cardboard scrap.
#
# Run:
#   python cnc.py jigsaw examples/nora_mini_100.yaml
#   python cnc.py validate build/cut_mini_nora_seed7.gcode
#
# Diode cold-start fade is handled by ramp_ms (the laser re-traces each
# closed loop's start once warm; length = ramp_ms/1000 * feed). GRBL laser
# mode ($32=1) fires only while moving, so G4 dwells do nothing.
#
# FIRE RISK: corrugated cardboard. Air assist non-negotiable; never
# leave the machine unattended.

head: laser
material: cardboard_corrugated_3mm
gcode: build/cut_mini_nora_seed7.gcode

jigsaw:
  mode: cut
  size: mini
  word: NORA
  seed: 7
  laser_mode: static     # M3 constant power
  ramp_ms: 1000      # re-trace each loop start hot (beats the diode ramp)
  feed: 800              # cut feedrate mm/min
  min_segment_mm: 0.05   # decimate any G1 chord shorter than this
  power_percent: 100     # weak diode — cut at full power (S1000)
